<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Transformation & Management Assessment — Vortexedge</title>

<style>
  :root{
    --chalk-green:#1F3B2C; --chalk-green-dark:#14281E;
    --paper:#F2ECDC; --paper-dim:#E7DEC7;
    --brass:#B8863B; --brass-light:#D8AE68;
    --red-pen:#A63D2E; --ink:#23324A; --chalk-white:#EDE7D8;
    --line:rgba(35,50,74,0.14); --shadow:0 10px 30px rgba(20,40,30,0.18);
    --radius:4px; font-size:16px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--chalk-green);
    background-image:
      radial-gradient(ellipse at top left, rgba(184,134,59,0.06), transparent 55%),
      radial-gradient(ellipse at bottom right, rgba(184,134,59,0.05), transparent 55%);
    color:var(--ink); font-family:'Work Sans',sans-serif; min-height:100vh; font-weight:600;
  }
  /* Bold everything by request — headings stay heavier for hierarchy */
  .section-sub, .cc-desc, .results-meta, .growth-card p, .package-desc,
  .q-hint, .step-count, .bd-name, .footer-note, .field input, .field select,
  .opt .txt, .build-list li, .package-list, .masthead-right{font-weight:600 !important;}
  .section-title, .cc-name, .package-name, .stamp-score, .brand-text .name,
  .results-school, h1, h2, h3, .growth-card h4{font-weight:700 !important;}
  h1,h2,h3,.display{font-family:'Zilla Slab',serif;}
  .mono{font-family:'IBM Plex Mono',monospace; letter-spacing:0.02em;}
  #app{max-width:1180px; margin:0 auto; padding:28px 20px 60px;}

  .masthead{
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 22px; margin-bottom:22px;
    border:1px solid rgba(237,231,216,0.18); border-radius:var(--radius);
    color:var(--chalk-white);
  }
  .brand{display:flex; align-items:center; gap:12px;}
  .brand-mark{
    width:38px; height:38px; border-radius:50%; border:2px solid var(--brass-light);
    display:flex; align-items:center; justify-content:center;
    font-family:'IBM Plex Mono'; font-weight:600; color:var(--brass-light); font-size:13px;
  }
  .brand-text .name{font-family:'Zilla Slab'; font-weight:700; font-size:17px; letter-spacing:0.01em;}
  .brand-text .tag{font-family:'IBM Plex Mono'; font-size:10.5px; text-transform:uppercase; letter-spacing:0.12em; color:var(--brass-light);}
  .masthead-right{font-family:'IBM Plex Mono'; font-size:11px; color:rgba(237,231,216,0.6); text-align:right; text-transform:uppercase; letter-spacing:0.1em;}

  .shell{display:grid; grid-template-columns:74px 1fr; gap:0; background:transparent;}
  @media (max-width:720px){.shell{grid-template-columns:46px 1fr;}}
  .tab-rail{display:flex; flex-direction:column; gap:6px; padding-top:10px;}
  .tab{
    position:relative; height:40px; display:flex; align-items:center; justify-content:center;
    font-family:'IBM Plex Mono'; font-weight:600; font-size:13px;
    color:rgba(237,231,216,0.4); background:rgba(237,231,216,0.05);
    border:1px solid rgba(237,231,216,0.12); border-right:none; border-radius:4px 0 0 4px;
    cursor:default; transition:all .25s ease;
  }
  .tab.done{color:var(--chalk-white); background:rgba(184,134,59,0.18); border-color:rgba(184,134,59,0.4);}
  .tab.done::after{content:"✓"; position:absolute; right:5px; top:3px; font-size:8px; color:var(--red-pen); background:var(--paper); border-radius:50%; width:12px; height:12px; display:flex; align-items:center; justify-content:center;}
  .tab.active{color:var(--chalk-green-dark); background:var(--paper); border-color:var(--paper); transform:translateX(6px); box-shadow:-3px 3px 0 rgba(0,0,0,0.12); font-weight:700;}

  .paper{
    background:var(--paper);
    background-image:repeating-linear-gradient(to bottom, transparent 0 38px, rgba(35,50,74,0.05) 38px 39px);
    border-radius:0 6px 6px 6px; box-shadow:var(--shadow);
    padding:40px 46px 34px; min-height:520px; position:relative;
  }
  @media (max-width:720px){.paper{padding:26px 20px 24px;}}
  .paper::before{content:""; position:absolute; left:0; top:0; bottom:0; width:52px; border-right:2px solid rgba(166,61,46,0.18); pointer-events:none;}
  @media (max-width:720px){.paper::before{display:none;}}

  .section-eyebrow{font-family:'IBM Plex Mono'; font-size:11.5px; letter-spacing:0.14em; text-transform:uppercase; color:var(--brass); margin-bottom:6px;}
  .section-title{font-size:28px; margin:0 0 4px; color:var(--chalk-green-dark);}
  .section-sub{color:rgba(35,50,74,0.62); margin:0 0 26px; font-size:14.5px; max-width:640px;}
  .read-cue{
    margin:0 0 24px; padding:14px 16px 14px 15px; max-width:660px;
    border-left:4px solid var(--brass); background:rgba(184,134,59,0.1); border-radius:0 6px 6px 0;
    font-size:16px; font-weight:600; color:var(--chalk-green-dark); line-height:1.45;
  }
  .read-mic{
    display:inline-block; font-family:'IBM Plex Mono'; font-size:10px; font-weight:700;
    text-transform:uppercase; letter-spacing:0.1em; color:var(--paper); background:var(--brass);
    padding:3px 8px; border-radius:3px; margin-right:8px; vertical-align:middle; white-space:nowrap;
  }
  .opt-letter{
    flex:0 0 24px; width:24px; height:24px; display:flex; align-items:center; justify-content:center;
    font-family:'IBM Plex Mono'; font-weight:700; font-size:13px; color:var(--chalk-green-dark);
    background:rgba(31,59,44,0.1); border-radius:4px; transition:all .12s ease;
  }
  .opt.checked .opt-letter{background:var(--red-pen); color:var(--paper);}
  .section-points{position:absolute; top:38px; right:44px; font-family:'IBM Plex Mono'; font-size:11px; color:rgba(35,50,74,0.45); text-transform:uppercase; letter-spacing:0.08em;}

  /* mode chooser */
  .chooser{display:grid; grid-template-columns:1fr 1fr; gap:20px; margin:8px 0 4px;}
  @media (max-width:640px){.chooser{grid-template-columns:1fr;}}
  .choice-card{
    border:2px solid var(--chalk-green-dark); border-radius:6px; padding:26px 24px; cursor:pointer;
    background:linear-gradient(180deg, rgba(184,134,59,0.05), transparent); transition:all .18s ease;
  }
  .choice-card:hover{background:var(--chalk-green-dark); color:var(--paper);}
  .choice-card:hover .cc-desc,.choice-card:hover .cc-ac{color:rgba(242,236,220,0.8);}
  .cc-ac{font-family:'IBM Plex Mono'; font-size:12px; letter-spacing:0.14em; color:var(--brass); text-transform:uppercase;}
  .cc-name{font-family:'Zilla Slab'; font-size:23px; font-weight:700; margin:8px 0 8px; line-height:1.15;}
  .cc-desc{font-size:14px; line-height:1.55; color:rgba(35,50,74,0.75);}

  .field-row{display:grid; grid-template-columns:repeat(2,1fr); gap:18px 28px; margin-bottom:8px;}
  @media (max-width:640px){.field-row{grid-template-columns:1fr;}}
  .field{display:flex; flex-direction:column; gap:6px;}
  .field label{font-size:12.5px; font-weight:600; color:var(--chalk-green-dark); text-transform:uppercase; letter-spacing:0.05em;}
  .field input,.field select{font-family:'Work Sans'; font-size:15px; padding:9px 10px; border:none; border-bottom:1.5px solid rgba(35,50,74,0.3); background:transparent; color:var(--ink); outline:none;}
  .field input:focus,.field select:focus{border-bottom-color:var(--red-pen);}
  .field.wide{grid-column:1/-1;}
  .level-boxes{display:flex; gap:16px; flex-wrap:wrap; margin-top:4px;}

  .question{margin-bottom:30px;}
  .question .q-label{font-weight:600; font-size:15.5px; margin-bottom:6px; color:var(--chalk-green-dark);}
  .q-badges{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px;}
  .q-badge{font-family:'IBM Plex Mono'; font-size:9.5px; text-transform:uppercase; letter-spacing:0.08em; padding:2px 7px; border-radius:2px; background:rgba(184,134,59,0.16); color:var(--brass);}
  .q-badge.pain{background:rgba(166,61,46,0.14); color:var(--red-pen);}
  .q-badge.need{background:rgba(31,59,44,0.12); color:var(--chalk-green-dark);}
  .q-hint{font-size:12.5px; color:rgba(35,50,74,0.5); font-style:italic; margin:-4px 0 12px;}

  .opt-grid{display:flex; flex-direction:column; gap:11px;}
  .opt-grid.compact{flex-flow:row wrap;}
  .opt-grid.compact .opt{flex:1 1 calc(50% - 6px); min-width:180px;}
  .opt{
    display:flex; align-items:center; gap:12px; cursor:pointer;
    padding:13px 15px; border:2px solid rgba(31,59,44,0.35); border-radius:6px;
    background:rgba(255,255,255,0.45); transition:transform .08s ease, background .15s ease, border-color .15s ease, box-shadow .15s ease;
    user-select:none; -webkit-tap-highlight-color:transparent;
  }
  .opt:hover{border-color:var(--brass); background:rgba(216,174,104,0.14); transform:translateX(3px);}
  .opt:active{transform:scale(0.98);}
  .opt.checked{border-color:var(--red-pen); background:rgba(166,61,46,0.1); box-shadow:0 3px 0 rgba(166,61,46,0.22); transform:translateX(4px);}
  .opt input{position:absolute; opacity:0; width:0; height:0;}
  .opt .box{width:22px; height:22px; flex:0 0 22px; border:2px solid var(--chalk-green-dark); border-radius:3px; position:relative; background:var(--paper); transition:all .12s ease;}
  .opt input:checked + .box{border-color:var(--red-pen); background:rgba(166,61,46,0.12);}
  .opt input:checked + .box::after{content:""; position:absolute; left:5px; top:0px; width:7px; height:13px; border-right:3px solid var(--red-pen); border-bottom:3px solid var(--red-pen); transform:rotate(38deg);}
  .opt .bubble{width:22px; height:22px; flex:0 0 22px; border-radius:50%; border:2px solid var(--chalk-green-dark); background:var(--paper); position:relative; transition:all .12s ease;}
  .opt input:checked + .bubble{background:radial-gradient(circle at 38% 34%, var(--brass-light) 0%, var(--brass) 55%, #8c6528 100%); border-color:var(--brass); box-shadow:0 0 0 3px rgba(184,134,59,0.25);}
  .opt .txt{font-size:15px; font-weight:600; line-height:1.35;}
  .opt.checked .txt{font-weight:700; color:var(--chalk-green-dark);}
  .opt.has-fill{flex-wrap:wrap;}
  .opt-fill{
    flex:1 1 100%; margin-top:8px; margin-left:34px; font-family:'Work Sans'; font-weight:600;
    font-size:14.5px; padding:9px 11px; border:2px dashed rgba(166,61,46,0.45); border-radius:5px;
    background:rgba(255,255,255,0.7); color:var(--ink); outline:none; transition:border-color .15s ease;
  }
  .opt-fill:focus{border-color:var(--red-pen); border-style:solid;}
  .opt-fill::placeholder{color:rgba(35,50,74,0.4); font-style:italic;}

  textarea.essay{width:100%; font-family:'Work Sans'; font-size:14.5px; padding:11px 12px; border:1.5px solid rgba(35,50,74,0.25); border-radius:4px; background:rgba(255,255,255,0.4); color:var(--ink); outline:none; resize:vertical; min-height:70px;}
  textarea.essay:focus{border-color:var(--red-pen);}

  .nav-row{display:flex; justify-content:space-between; align-items:center; margin-top:34px; padding-top:18px; border-top:1px dashed rgba(35,50,74,0.25);}
  .btn{font-family:'IBM Plex Mono'; font-size:12.5px; text-transform:uppercase; letter-spacing:0.08em; padding:11px 22px; border-radius:2px; border:1.5px solid var(--chalk-green-dark); background:transparent; color:var(--chalk-green-dark); cursor:pointer; font-weight:600; transition:all .15s ease;}
  .btn:hover{background:var(--chalk-green-dark); color:var(--paper);}
  .btn.primary{background:var(--chalk-green-dark); color:var(--paper);}
  .btn.primary:hover{background:var(--red-pen); border-color:var(--red-pen); color:var(--paper);}
  .btn:disabled{opacity:0.3; cursor:not-allowed;}
  .btn:disabled:hover{background:transparent; color:var(--chalk-green-dark);}
  .btn.ghost{border-color:rgba(35,50,74,0.3); color:rgba(35,50,74,0.7);}
  .step-count{font-family:'IBM Plex Mono'; font-size:11.5px; color:rgba(35,50,74,0.45);}

  .results-head{text-align:center; padding:6px 0 30px;}
  .stamp-wrap{position:relative; width:230px; height:230px; margin:0 auto 8px; transform:rotate(-5deg);}
  .stamp-wrap svg{width:100%; height:100%;}
  .stamp-ring-text{font-family:'IBM Plex Mono'; font-size:10.2px; fill:var(--red-pen); letter-spacing:2px;}
  .stamp-circle{fill:none; stroke:var(--red-pen); stroke-width:2; stroke-dasharray:3 4;}
  .stamp-center{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--red-pen);}
  .stamp-score{font-family:'Zilla Slab'; font-weight:700; font-size:52px; line-height:1;}
  .stamp-max{font-family:'IBM Plex Mono'; font-size:12px; opacity:0.75; margin-top:-2px;}
  .stamp-level{font-family:'IBM Plex Mono'; font-size:10.5px; text-transform:uppercase; letter-spacing:0.08em; margin-top:6px; text-align:center; max-width:150px;}

  .results-school{font-family:'Zilla Slab'; font-size:22px; color:var(--chalk-green-dark); margin-top:6px;}
  .results-meta{font-family:'IBM Plex Mono'; font-size:11.5px; color:rgba(35,50,74,0.5); margin-top:2px;}
  .sync-badge{display:inline-flex; align-items:center; gap:6px; margin-top:10px; font-family:'IBM Plex Mono'; font-size:10.5px; text-transform:uppercase; letter-spacing:0.08em; padding:5px 11px; border-radius:2px;}
  .sync-badge.saving{background:rgba(35,50,74,0.08); color:rgba(35,50,74,0.6);}
  .sync-badge.saved{background:rgba(31,59,44,0.12); color:var(--chalk-green-dark);}
  .sync-badge.error{background:rgba(166,61,46,0.14); color:var(--red-pen);}
  .sync-dot{width:6px; height:6px; border-radius:50%; background:currentColor;}

  .urgency-band{display:flex; align-items:center; justify-content:center; gap:14px; flex-wrap:wrap; margin:6px 0 4px;}
  .urgency-pill{font-family:'IBM Plex Mono'; font-size:11px; text-transform:uppercase; letter-spacing:0.1em; padding:6px 13px; border-radius:2px; border:1.5px solid;}
  .u-hot{border-color:var(--red-pen); color:var(--red-pen); background:rgba(166,61,46,0.1);}
  .u-warm{border-color:var(--brass); color:var(--brass); background:rgba(184,134,59,0.12);}
  .u-cool{border-color:var(--chalk-green-dark); color:var(--chalk-green-dark); background:rgba(31,59,44,0.1);}

  .breakdown{display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:14px 24px; margin:26px 0 8px;}
  .bd-row .bd-top{display:flex; justify-content:space-between; font-size:12.5px; margin-bottom:5px;}
  .bd-name{font-weight:600;}
  .bd-score{font-family:'IBM Plex Mono'; color:var(--brass);}
  .bd-bar{height:8px; background:rgba(35,50,74,0.1); border-radius:4px; overflow:hidden;}
  .bd-fill{height:100%; background:linear-gradient(90deg, var(--brass), var(--red-pen)); border-radius:4px;}

  .divider{border:none; border-top:1px dashed rgba(35,50,74,0.25); margin:32px 0;}

  .growth-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:16px;}
  .growth-card{border:1px solid rgba(35,50,74,0.15); border-radius:4px; padding:16px 18px; background:rgba(255,255,255,0.35);}
  .growth-card .gc-icon{font-family:'IBM Plex Mono'; font-size:10.5px; color:var(--brass); text-transform:uppercase; letter-spacing:0.1em;}
  .growth-card h4{margin:6px 0 8px; font-family:'Zilla Slab'; font-size:17px; color:var(--chalk-green-dark);}
  .growth-card p{margin:0; font-size:13.5px; line-height:1.5; color:rgba(35,50,74,0.8);}
  .growth-card .tier{display:inline-block; margin-top:10px; font-family:'IBM Plex Mono'; font-size:10px; text-transform:uppercase; letter-spacing:0.08em; padding:3px 8px; border-radius:2px;}
  .tier.significant{background:rgba(166,61,46,0.14); color:var(--red-pen);}
  .tier.moderate{background:rgba(184,134,59,0.16); color:var(--brass);}
  .tier.incremental{background:rgba(31,59,44,0.12); color:var(--chalk-green-dark);}

  .package-card{border:2px solid var(--chalk-green-dark); border-radius:4px; padding:26px 28px; margin-top:8px; background:linear-gradient(180deg, rgba(184,134,59,0.06), transparent);}
  .package-eyebrow{font-family:'IBM Plex Mono'; font-size:11px; text-transform:uppercase; letter-spacing:0.12em; color:var(--brass);}
  .package-name{font-family:'Zilla Slab'; font-size:26px; font-weight:700; color:var(--chalk-green-dark); margin:4px 0 10px;}
  .package-desc{font-size:14.5px; line-height:1.6; color:rgba(35,50,74,0.85); margin-bottom:14px;}
  .package-list{margin:0; padding-left:20px; font-size:13.5px; line-height:1.9; color:var(--ink);}

  .build-list{margin:10px 0 0; padding:0; list-style:none;}
  .build-list li{display:flex; gap:10px; align-items:flex-start; padding:7px 0; border-bottom:1px dashed rgba(35,50,74,0.15); font-size:14px;}
  .build-list li:before{content:"▹"; color:var(--red-pen); font-weight:700;}

  .focus-tags{display:flex; flex-wrap:wrap; gap:8px; margin-top:10px;}
  .focus-tag{font-family:'IBM Plex Mono'; font-size:11.5px; background:rgba(35,50,74,0.08); padding:5px 10px; border-radius:2px; color:var(--ink);}

  .results-actions{display:flex; gap:12px; justify-content:center; margin-top:36px; flex-wrap:wrap;}
  .footer-note{text-align:center; color:rgba(237,231,216,0.4); font-family:'IBM Plex Mono'; font-size:10.5px; margin-top:18px; letter-spacing:0.05em;}

  @media print{
    body{background:#fff;}
    .masthead,.tab-rail,.nav-row,.results-actions{display:none !important;}
    .shell{grid-template-columns:1fr;}
    .paper{box-shadow:none; border-radius:0; padding:0; background-image:none;}
    #app{max-width:100%; padding:0;}
  }
  .hidden{display:none !important;}
</style>
</head>

/* ===================== DEFINITIONS ===================== */

const ASSESSMENTS = {

function optionHtml(groupId, label, checked, type, fillIn, fillVal, fillPlaceholder, letter){
  const shape = type==="radio" ? `<span class="bubble"></span>` : `<span class="box"></span>`;
  const inputType = type==="radio" ? "radio" : "checkbox";
  const chip = letter ? `<span class="opt-letter">${letter}</span>` : "";
  const fillField = fillIn ? `<input type="text" class="opt-fill" data-fill="${groupId}" placeholder="${esc(fillPlaceholder||"")}" value="${esc(fillVal||"")}">` : "";
  return `<label class="opt${checked?" checked":""}${fillIn?" has-fill":""}">
    <input type="${inputType}" name="${groupId}" value="${esc(label)}" data-group="${groupId}" ${fillIn?'data-fillopt="1"':""} ${checked?"checked":""}>
    ${shape}${chip}<span class="txt">${esc(label)}</span>${fillField}
  </label>`;
}
const LETTERS="ABCDEFGH";
const GOAL_LABEL = { pain:["pain","Pain point"], need:["need","Need"], build:["","What to build"], urgency:["pain","Desperation"], timeline:["","Timeline"] };

function renderQuestion(qIdx){
  const p=document.getElementById("paper");
  const cfg=A(); const q=cfg.questions[qIdx];
  const isLast = qIdx === cfg.questions.length-1;
  const val = state.answers[q.id];
  const badges = (q.goal||[]).map(g=>{
    const gl=GOAL_LABEL[g]||["",g];
    return `<span class="q-badge ${gl[0]}">${gl[1]}</span>`;
  }).join("");

  let opts;
  if(q.type==="checkbox"){
    const selected = val || [];
    opts = (q.custom ? q.options.map(o=>o[0]) : q.options)
      .map((label,idx)=>optionHtml(q.id, label, selected.includes(label), "checkbox", false, "", "", LETTERS[idx])).join("");
  } else {
    opts = q.options.map((o,idx)=>{
      const label=o[0]; const meta=o[2]||{};
      const isChecked = (val===label) || (meta.fillIn && typeof val==="string" && val.indexOf(label)===0);
      const fillVal = (meta.fillIn && typeof val==="string" && val.indexOf(label)===0) ? val.slice(label.length).replace(/^\s*/,"") : "";
      return optionHtml(q.id, label, isChecked, "radio", meta.fillIn, fillVal, meta.placeholder, LETTERS[idx]);
    }).join("");
  }

  const essayHtml = isLast ? `
    <div class="question">
      <div class="q-label">${esc(cfg.essay.label)}</div>
      <textarea class="essay" id="essayBox" placeholder="${esc(cfg.essay.placeholder)}">${esc(state.essay)}</textarea>
    </div>` : "";

  p.innerHTML = `
    <div class="section-points">${q.max} points</div>
    <div class="section-eyebrow">${cfg.acronym} · Question ${qIdx+1} of ${cfg.questions.length}</div>
    <h1 class="section-title">${esc(q.title)}</h1>
    <div class="read-cue"><span class="read-mic">🎤 Read to the client</span> ${esc(q.sub)}</div>
    <div class="question">
      <div class="q-badges">${badges}</div>
      <div class="q-label">${esc(q.label)}</div>
      <div class="opt-grid">${opts}</div>
    </div>
    ${essayHtml}
    <div class="nav-row">
      <button class="btn ghost" id="btnBack">← Back</button>
      <span class="step-count">Question ${state.step} of ${cfg.questions.length}</span>
      <button class="btn primary" id="btnNext">${isLast?"See Report →":"Next question →"}</button>
    </div>
  `;

  p.querySelectorAll('input[type="checkbox"]').forEach(el=>{
    el.addEventListener("change", e=>{
      const qid=e.target.dataset.group, v=e.target.value;
      const arr = state.answers[qid] || [];
      if(e.target.checked){ if(!arr.includes(v)) arr.push(v); }
      else { const idx=arr.indexOf(v); if(idx>-1) arr.splice(idx,1); }
      state.answers[qid]=arr;
      e.target.closest("label").classList.toggle("checked", e.target.checked);
    });
  });
  p.querySelectorAll('input[type="radio"]').forEach(el=>{
    el.addEventListener("change", e=>{
      const qid=e.target.dataset.group;
      if(e.target.dataset.fillopt){
        const fill=p.querySelector(`input[data-fill="${qid}"]`);
        const typed=fill&&fill.value.trim()?" "+fill.value.trim():"";
        state.answers[qid]=e.target.value+typed;
        if(fill){ fill.focus(); }
      } else {
        state.answers[qid]=e.target.value;
      }
      p.querySelectorAll(`input[name="${qid}"]`).forEach(r=>r.closest("label").classList.toggle("checked", r.checked));
    });
  });
  // typing in a fill-in field selects its radio and appends the text to the answer
  p.querySelectorAll('input.opt-fill').forEach(el=>{
    el.addEventListener("input", e=>{
      const qid=e.target.dataset.fill;
      const radio=p.querySelector(`input[name="${qid}"][data-fillopt="1"]`);
      if(radio){
        radio.checked=true;
        radio.closest("label").classList.add("checked");
        p.querySelectorAll(`input[name="${qid}"]`).forEach(r=>{ if(r!==radio) r.closest("label").classList.remove("checked"); });
        const base=radio.value;
        const typed=e.target.value.trim()?" "+e.target.value.trim():"";
        state.answers[qid]=base+typed;
      }
    });
    el.addEventListener("click", e=> e.preventDefault===undefined?null:e.stopPropagation());
  });
  const eb=document.getElementById("essayBox");
  if(eb) eb.addEventListener("input", e=> state.essay=e.target.value);

  document.getElementById("btnBack").addEventListener("click", ()=>{ state.step--; renderAll(); });
  document.getElementById("btnNext").addEventListener("click", ()=>{ state.step++; renderAll(); });
}

/* ===================== SCORING ===================== */
/* find the option a radio answer corresponds to, allowing fill-in options
   whose stored answer is "<base label> <typed text>" */
function matchOption(q, val){
  if(val==null) return null;
  let opt=q.options.find(o=>o[0]===val);
  if(opt) return opt;
  // fill-in: answer starts with the base label
  opt=q.options.find(o=>(o[2]&&o[2].fillIn) && typeof val==="string" && val.indexOf(o[0])===0);
  return opt||null;
}
function scoreQuestion(q){
  const val = state.answers[q.id];
  if(q.type==="radio"){
    if(!val) return 0;
    const opt=matchOption(q, val);
    return opt ? Math.min(opt[1], q.max) : 0;
  }
  // checkbox
  const selected = val || [];
  if(q.custom){
    let t=0; selected.forEach(label=>{ const o=q.options.find(o=>o[0]===label); if(o) t+=o[1]; });
    return Math.min(t, q.max);
  }
  if(q.invert){
    // each ticked item = a manual gap; more ticks = LOWER score
    const frac = selected.length / q.options.length;
    return Math.round((1 - frac) * q.max * 10)/10;
  }
  // normal checkbox: more selected = higher (ambition/coverage)
  return Math.min(Math.round((selected.length / q.options.length) * q.max * 10)/10, q.max);
}
function computeScores(){
  const byQ={}; let total=0;
  A().questions.forEach(q=>{ const s=scoreQuestion(q); byQ[q.id]=s; total+=s; });
  return { byQ, total: Math.round(total*10)/10 };
}
function maturityFor(score){
  const M=A().maturity;
  return M.find(l=> score>=l.min && score<=l.max) || M[M.length-1];
}

/* urgency + timeline read straight off q8/q9/q10 for the desperation band */
function urgencyProfile(){
  const q8 = state.answers.q8, q9 = state.answers.q9, q10 = state.answers.q10;
  const uPts = (URGENCY_OPTS.find(o=>o[0]===q8)||[,0])[1];
  const tPts = (TIMELINE_OPTS.find(o=>typeof q9==="string" && q9.indexOf(o[0])===0)||[,0])[1];
  const bPts = (BUDGET_OPTS.find(o=>o[0]===q10)||[,0])[1];
  const combined = uPts + tPts + bPts; // 0..30
  let tier, cls, note;
  if(combined>=22){ tier="HOT LEAD — act now"; cls="u-hot"; note="High desperation, near-term timeline and budget readiness. Prioritise this proposal."; }
  else if(combined>=12){ tier="WARM — follow up soon"; cls="u-warm"; note="Real interest with some flexibility on timing or budget. Worth a prompt call."; }
  else { tier="COOL — nurture"; cls="u-cool"; note="Early-stage curiosity. Keep in the pipeline and educate."; }
  return { uPts, tPts, bPts, combined, tier, cls, note,
    timelineText: q9 || "Not stated", budgetText: q10 || "Not stated", urgencyText: q8 || "Not stated" };
}

/* what to build: gather the "build" checkbox + any manual-gap items */
function buildTargets(){
  const cfg=A(); const targets=new Set();
  // pull from every checkbox question whose goal includes "build"
  cfg.questions.forEach(q=>{
    if(q.type==="checkbox" && (q.goal||[]).includes("build")){
      const v=state.answers[q.id];
      if(Array.isArray(v)) v.forEach(x=>targets.add(x));
    }
  });
  // manual-gap question (invert) → each ticked gap becomes a build target framed as "digitise X"
  const gapQ = cfg.questions.find(q=> q.invert);
  if(gapQ){ const v=state.answers[gapQ.id]; if(Array.isArray(v)) v.forEach(x=>targets.add("Digitise: "+x)); }
  return Array.from(targets);
}

function recommendPackage(total){
  const cfg=A(); const entries=Object.entries(cfg.packages);
  let chosen=entries[0][0];
  for(const [name,def] of entries){ if(total<=def.cut){ chosen=name; break; } chosen=name; }
  // size override
  const size=parseInt(state.info.students,10)||0;
  if(size>=1500) chosen=entries[entries.length-1][0];
  return chosen;
}

/* growth opportunities — generic across both, driven by weakest questions */
function buildGrowth(byQ){
  const cfg=A();
  const ranked = cfg.questions
    .filter(q=> !["urgency","timeline"].some(g=>(q.goal||[]).includes(g)))
    .map(q=>({ q, frac: byQ[q.id]/q.max }))
    .sort((a,b)=>a.frac-b.frac);
  return ranked.slice(0,4).map((r,i)=>{
    const tier = r.frac<0.4?"significant":r.frac<0.7?"moderate":"incremental";
    const label = tier==="significant"?"High opportunity":tier==="moderate"?"Moderate opportunity":"Incremental gain";
    const text = tier==="significant"
      ? "A weak spot today — the fastest, most visible win from this engagement."
      : tier==="moderate"
      ? "Partly in place; tightening this would give a clear, near-term lift."
      : "Already fairly strong — remaining gains are polish and automation.";
    return { icon:String(i+1).padStart(2,"0")+" · "+r.q.title, title:r.q.title, tier, label, text };
  });
}

/* ===================== SUBMIT TO SUPABASE ===================== */
const LEAD_QUEUE_KEY = "ve_pending_leads";
function getQueue(){ try{ return JSON.parse(localStorage.getItem(LEAD_QUEUE_KEY)||"[]"); }catch(e){ return []; } }
function setQueue(q){ try{ localStorage.setItem(LEAD_QUEUE_KEY, JSON.stringify(q)); }catch(e){} }
function queueLead(mode, payload){
  const q=getQueue();
  q.push({ mode, payload, queuedAt:new Date().toISOString() });
  setQueue(q);
}

/* the actual network write; returns true on success */
async function pushLead(mode, payload){
  try{
    let ok=false;
    if(mode==="school"){
      const { error } = await sb.schema("schools").rpc("submit_assessment_lead", {
        p_school_name: payload.orgName || "Unnamed School",
        p_proprietor: payload.proprietor || null,
        p_contact_person: payload.contact || null,
        p_phone: payload.phone || null,
        p_email: payload.email || null,
        p_address: payload.address || null,
        p_students: numOrNull(payload.students),
        p_teachers: numOrNull(payload.teachers),
        p_levels: [],
        p_total_score: payload.total,
        p_maturity_level: payload.maturity,
        p_section_scores: payload.sectionScores,
        p_focus_areas: { build: payload.buildTargets, urgency: payload.urgency },
        p_raw_answers: payload.answers,
        p_package_recommended: payload.package
      });
      if(!error) ok=true; else console.warn("school rpc:", error);
    }
    if(!ok){
      const { error } = await sb.from("assessment_leads").insert({
        assessment_type: mode,
        acronym: (ASSESSMENTS[mode]||{}).acronym,
        org_name: payload.orgName || null,
        proprietor: payload.proprietor || null,
        contact_person: payload.contact || null,
        phone: payload.phone || null,
        email: payload.email || null,
        address: payload.address || null,
        size_metric: numOrNull(payload.students),
        secondary_metric: numOrNull(payload.teachers),
        total_score: payload.total,
        maturity_level: payload.maturity,
        section_scores: payload.sectionScores,
        build_targets: payload.buildTargets,
        urgency: payload.urgency,
        recommended_package: payload.package,
        pain_note: payload.essay || null,
        raw_answers: payload.answers,
        notify_email: LEAD_EMAIL
      });
      if(!error) ok=true; else console.warn("generic insert:", error);
    }
    return ok;
  }catch(e){ console.error("pushLead failed:", e); return false; }
}

/* try to send any queued leads (called on load and when connection returns) */
async function flushQueue(){
  let q=getQueue();
  if(!q.length) return;
  const remaining=[];
  for(const item of q){
    const ok = (navigator.onLine!==false) ? await pushLead(item.mode, item.payload) : false;
    if(!ok) remaining.push(item);
  }
  setQueue(remaining);
  if(remaining.length===0 && state.leadStatus==="queued"){ state.leadStatus="saved"; updateSyncBadge(); }
}

async function submitLead(payload){
  if(state.leadStatus==="saving"||state.leadStatus==="saved") return;
  state.leadStatus="saving"; updateSyncBadge();
  const mode=state.mode;
  if(navigator.onLine===false){
    queueLead(mode, payload);
    state.leadStatus="queued"; updateSyncBadge();
    return;
  }
  const ok = await pushLead(mode, payload);
  if(ok){ state.leadStatus="saved"; }
  else { queueLead(mode, payload); state.leadStatus="queued"; }
  updateSyncBadge();
}
function updateSyncBadge(){
  const el=document.getElementById("syncBadge"); if(!el) return;
  const map={ saving:["saving","Saving to pipeline…"], saved:["saved","Saved to Vortexedge pipeline"], queued:["saving","Saved on device — will sync when online"], error:["error","Couldn't save — use Email button below"] };
  const cfg=map[state.leadStatus];
  if(!cfg){ el.style.display="none"; return; }
  el.style.display="inline-flex"; el.className="sync-badge "+cfg[0];
  el.innerHTML=`<span class="sync-dot"></span>${cfg[1]}`;
}

/* ===================== EMAIL (mailto) ===================== */
function buildEmail(payload, urgency, growth){
  const L=[];
  L.push(`${A().acronym} — ${A().title}`);
  L.push("");
  L.push(`Organisation: ${payload.orgName||"—"}`);
  L.push(`${state.mode==="school"?"Proprietor/Principal":"Senior Pastor"}: ${payload.proprietor||"—"}`);
  L.push(`Contact: ${payload.contact||"—"}  |  Phone: ${payload.phone||"—"}  |  Email: ${payload.email||"—"}`);
  L.push(`Address: ${payload.address||"—"}`);
  L.push(`${state.mode==="school"?"Students":"Congregation"}: ${payload.students||"—"}  |  ${state.mode==="school"?"Teachers":"Online members"}: ${payload.teachers||"—"}`);
  L.push("");
  L.push(`SCORE: ${payload.total}/100  —  ${payload.maturity}`);
  L.push(`LEAD TEMPERATURE: ${urgency.tier}`);
  L.push(`Desperation: ${urgency.urgencyText}`);
  L.push(`Timeline: ${urgency.timelineText}`);
  L.push(`Budget: ${urgency.budgetText}`);
  L.push("");
  L.push(`RECOMMENDED PACKAGE: ${payload.package}`);
  L.push("");
  L.push("WHAT TO BUILD:");
  (payload.buildTargets.length?payload.buildTargets:["(none selected)"]).forEach(t=>L.push("  - "+t));
  L.push("");
  L.push("SECTION SCORES:");
  Object.entries(payload.sectionScores).forEach(([k,v])=>L.push(`  ${k}: ${v.score}/${v.max} — ${v.title}`));
  L.push("");
  if(payload.essay){ L.push("PAIN POINT (their words): "+payload.essay); L.push(""); }
  L.push("— Sent from the Vortexedge Assessment app");
  const subject = `${A().acronym} Lead: ${payload.orgName||"Unnamed"} — ${payload.total}/100 (${urgency.tier.split(" ")[0]})`;
  return { subject, body:L.join("\n") };
}

/* ===================== RENDER: RESULTS ===================== */
function renderResults(){
  const p=document.getElementById("paper"); const cfg=A();
  const { byQ, total } = computeScores();
  const maturity = maturityFor(total);
  const growth = buildGrowth(byQ);
  const pkgName = recommendPackage(total);
  const pkg = cfg.packages[pkgName];
  const urgency = urgencyProfile();
  const targets = buildTargets();

  const sectionScores={};
  cfg.questions.forEach(q=> sectionScores[q.id]={ score:byQ[q.id], max:q.max, title:q.title });

  const payload = {
    orgName:state.info.orgName, proprietor:state.info.proprietor, contact:state.info.contact,
    phone:state.info.phone, email:state.info.email, address:state.info.address,
    students:state.info.students, teachers:state.info.teachers,
    total, maturity:maturity.label, sectionScores, buildTargets:targets,
    urgency:{ tier:urgency.tier, desperation:urgency.urgencyText, timeline:urgency.timelineText, budget:urgency.budgetText, score:urgency.combined },
    package:pkgName, essay:state.essay, answers:state.answers
  };

  const stampId="ring"+Math.random().toString(36).slice(2,8);
  const sizeLabel = state.mode==="school"
    ? `${esc(state.info.students||"—")} students · ${esc(state.info.teachers||"—")} teachers`
    : `${esc(state.info.students||"—")} congregation · ${esc(state.info.teachers||"—")} online members`;

  p.innerHTML = `
    <div class="results-head">
      <div class="stamp-wrap">
        <svg viewBox="0 0 220 220">
          <defs><path id="${stampId}" d="M110,18 a92,92 0 1,1 -0.1,0" /></defs>
          <circle class="stamp-circle" cx="110" cy="110" r="104"/>
          <circle class="stamp-circle" cx="110" cy="110" r="92"/>
          <text class="stamp-ring-text"><textPath href="#${stampId}" startOffset="2%">${esc(cfg.stampRing)} ${esc(cfg.stampRing)}</textPath></text>
        </svg>
        <div class="stamp-center">
          <div class="stamp-score">${total}</div>
          <div class="stamp-max">/ 100</div>
          <div class="stamp-level">${esc(maturity.label)}</div>
        </div>
      </div>
      <div class="results-school">${esc(state.info.orgName || ("Unnamed "+cfg.orgWord))}</div>
      <div class="results-meta">${sizeLabel}</div>
      <div class="urgency-band">
        <span class="urgency-pill ${urgency.cls}">${esc(urgency.tier)}</span>
      </div>
      <div class="results-meta" style="max-width:520px;margin:8px auto 0;">${esc(urgency.note)}</div>
      <div><span class="sync-badge" id="syncBadge" style="display:none;"></span></div>
    </div>

    <div class="growth-grid" style="margin-bottom:8px;">
      <div class="growth-card"><div class="gc-icon">Desperation</div><h4 style="font-size:15px;">${esc(urgency.urgencyText)}</h4></div>
      <div class="growth-card"><div class="gc-icon">Timeline</div><h4 style="font-size:15px;">${esc(urgency.timelineText)}</h4></div>
      <div class="growth-card"><div class="gc-icon">Budget</div><h4 style="font-size:15px;">${esc(urgency.budgetText)}</h4></div>
    </div>

    <hr class="divider">

    <h2 class="section-title" style="font-size:20px;">Score Breakdown</h2>
    <div class="breakdown">
      ${cfg.questions.map(q=>{
        const val=byQ[q.id]; const pct=Math.round((val/q.max)*100);
        return `<div class="bd-row">
          <div class="bd-top"><span class="bd-name">Q${cfg.questions.indexOf(q)+1} · ${esc(q.title)}</span><span class="bd-score">${val}/${q.max}</span></div>
          <div class="bd-bar"><div class="bd-fill" style="width:${pct}%"></div></div>
        </div>`;
      }).join("")}
    </div>

    <hr class="divider">

    <h2 class="section-title" style="font-size:20px;">What Vortexedge Should Build</h2>
    ${ targets.length ? `<ul class="build-list">${targets.map(t=>`<li>${esc(t)}</li>`).join("")}</ul>`
      : `<p class="section-sub">No specific systems ticked — start from the recommended package below.</p>` }

    <hr class="divider">

    <h2 class="section-title" style="font-size:20px;">Potential Growth Opportunities</h2>
    <div class="growth-grid">
      ${growth.map(g=>`
        <div class="growth-card">
          <div class="gc-icon">${esc(g.icon)}</div>
          <h4>${esc(g.title)}</h4>
          <p>${esc(g.text)}</p>
          <span class="tier ${g.tier}">${esc(g.label)}</span>
        </div>`).join("")}
    </div>

    <hr class="divider">

    <h2 class="section-title" style="font-size:20px;">Recommended Package</h2>
    <div class="package-card">
      <div class="package-eyebrow">Best fit based on this assessment</div>
      <div class="package-name">${esc(pkgName)}</div>
      <div class="package-desc">${esc(pkg.desc)}</div>
      <ul class="package-list">${pkg.items.map(i=>`<li>${esc(i)}</li>`).join("")}</ul>
    </div>

    ${ state.essay ? `<hr class="divider"><h2 class="section-title" style="font-size:20px;">In Their Words</h2><p class="section-sub">“${esc(state.essay)}”</p>` : "" }

    <div class="results-actions">
      <button class="btn ghost" id="btnBack">← Back</button>
      <button class="btn primary" id="btnEmail">✉ Email results to Vortexedge</button>
      <button class="btn ghost" id="btnPrint">Print / Save PDF</button>
      <button class="btn ghost" id="btnRestart">New assessment</button>
    </div>
  `;

  updateSyncBadge();
  submitLead(payload);

  document.getElementById("btnBack").addEventListener("click", ()=>{ state.step--; renderAll(); });
  document.getElementById("btnPrint").addEventListener("click", ()=> window.print());
  document.getElementById("btnEmail").addEventListener("click", ()=>{
    const { subject, body } = buildEmail(payload, urgency, growth);
    window.location.href = `mailto:${LEAD_EMAIL}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  });
  document.getElementById("btnRestart").addEventListener("click", ()=>{
    if(confirm("Start a new assessment? Current answers will be cleared.")){
      state.mode=null; state.step=0; state.info={}; state.answers={}; state.essay=""; state.leadStatus="idle";
      setBrand(); renderAll();
    }
  });
}

/* ===================== UTIL + ROUTER ===================== */
function numOrNull(v){ if(v==null) return null; const n=parseInt(String(v).replace(/[^0-9]/g,""),10); return Number.isFinite(n)?n:null; }
function esc(str){
  return String(str==null?"":str).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
function renderAll(){
  renderTabRail(); setBrand(); window.scrollTo(0,0);
  if(!state.mode){ renderChooser(); return; }
  if(state.step===0){ renderCover(); return; }
  const qIdx = state.step-1;
  if(qIdx < A().questions.length){ renderQuestion(qIdx); return; }
  renderResults();
}
renderAll();

/* attempt to sync any leads saved offline during earlier interviews */
window.addEventListener("online", flushQueue);
try{ flushQueue(); }catch(e){}
</script>
