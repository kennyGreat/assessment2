<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<title>Digital Transformation &amp; Management Assessment — Vortexedge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zilla+Slab:wght@400;600;700&family=Work+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1F3B2C">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VE Assessment">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" href="icons/icon-192.png" sizes="192x192" type="image/png">
<style>
  :root{
    --chalk-green:#1F3B2C; --chalk-green-dark:#14281E;
    --paper:#F2ECDC; --paper-dim:#E7DEC7;
    --brass:#B8863B; --brass-light:#D8AE68;
    --red-pen:#A63D2E; --ink:#23324A; --chalk-white:#EDE7D8;
    --line:rgba(35,50,74,0.14); --shadow:0 10px 30px rgba(20,40,30,0.18);
    --radius:4px; font-size:16px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  /* old-Android safety: stop font auto-zoom + enable momentum scroll */
  html{-webkit-text-size-adjust:100%; -ms-text-size-adjust:100%; text-size-adjust:100%;}
  body{
    background:#1F3B2C;
    background:var(--chalk-green);
    background-image:
      radial-gradient(ellipse at top left, rgba(184,134,59,0.06), transparent 55%),
      radial-gradient(ellipse at bottom right, rgba(184,134,59,0.05), transparent 55%);
    color:#23324A; color:var(--ink); font-family:'Work Sans',sans-serif; min-height:100vh; font-weight:600;
    -webkit-overflow-scrolling:touch;
  }
  /* Bold everything by request — headings stay heavier for hierarchy */
  .section-sub, .cc-desc, .results-meta, .growth-card p, .package-desc,
  .q-hint, .step-count, .bd-name, .footer-note, .field input, .field select,
  .opt .txt, .build-list li, .package-list, .masthead-right{font-weight:600 !important;}
  .section-title, .cc-name, .package-name, .stamp-score, .brand-text .name,
  .results-school, h1, h2, h3, .growth-card h4{font-weight:700 !important;}
  h1,h2,h3,.display{font-family:'Zilla Slab',serif;}
  .mono{font-family:'IBM Plex Mono',monospace; letter-spacing:0.02em;}
  #app{max-width:1180px; margin:0 auto; padding:28px 20px 60px;}

  .masthead{
    display:-webkit-box; display:-webkit-flex; display:flex;
    -webkit-box-align:center; -webkit-align-items:center; align-items:center;
    -webkit-box-pack:justify; -webkit-justify-content:space-between; justify-content:space-between;
    padding:18px 22px; margin-bottom:22px;
    border:1px solid rgba(237,231,216,0.18); border-radius:var(--radius);
    color:var(--chalk-white);
  }
  .brand{display:-webkit-box; display:-webkit-flex; display:flex; -webkit-box-align:center; -webkit-align-items:center; align-items:center; gap:12px;}
  .brand-mark{
    width:38px; height:38px; border-radius:50%; border:2px solid var(--brass-light);
    display:-webkit-box; display:-webkit-flex; display:flex; -webkit-box-align:center; -webkit-align-items:center; align-items:center; -webkit-box-pack:center; -webkit-justify-content:center; justify-content:center;
    font-family:'IBM Plex Mono'; font-weight:600; color:var(--brass-light); font-size:13px;
  }
  .brand-text .name{font-family:'Zilla Slab'; font-weight:700; font-size:17px; letter-spacing:0.01em;}
  .brand-text .tag{font-family:'IBM Plex Mono'; font-size:10.5px; text-transform:uppercase; letter-spacing:0.12em; color:var(--brass-light);}
  .masthead-right{font-family:'IBM Plex Mono'; font-size:11px; color:rgba(237,231,216,0.6); text-align:right; text-transform:uppercase; letter-spacing:0.1em;}

  .shell{display:-ms-grid; display:grid; -ms-grid-columns:74px 1fr; grid-template-columns:74px 1fr; gap:0; background:transparent;}
  @media (max-width:720px){.shell{-ms-grid-columns:46px 1fr; grid-template-columns:46px 1fr;}}
  .tab-rail{display:-webkit-box; display:-webkit-flex; display:flex; -webkit-box-orient:vertical; -webkit-box-direction:normal; -webkit-flex-direction:column; flex-direction:column; gap:6px; padding-top:10px;}
  .tab{
    position:relative; height:40px; display:-webkit-box; display:-webkit-flex; display:flex;
    -webkit-box-align:center; -webkit-align-items:center; align-items:center;
    -webkit-box-pack:center; -webkit-justify-content:center; justify-content:center;
    font-family:'IBM Plex Mono'; font-weight:600; font-size:13px;
    color:rgba(237,231,216,0.4); background:rgba(237,231,216,0.05);
    border:1px solid rgba(237,231,216,0.12); border-right:none; border-radius:4px 0 0 4px;
    cursor:default; -webkit-transition:all .25s ease; transition:all .25s ease;
  }
  .tab.done{color:var(--chalk-white); background:rgba(184,134,59,0.18); border-color:rgba(184,134,59,0.4);}
  .tab.done::after{content:"\2713"; position:absolute; right:5px; top:3px; font-size:8px; color:var(--red-pen); background:var(--paper); border-radius:50%; width:12px; height:12px; display:-webkit-box; display:-webkit-flex; display:flex; -webkit-box-align:center; -webkit-align-items:center; align-items:center; -webkit-box-pack:center; -webkit-justify-content:center; justify-content:center;}
  .tab.active{color:var(--chalk-green-dark); background:var(--paper); border-color:var(--paper); -webkit-transform:translateX(6px); transform:translateX(6px); box-shadow:-3px 3px 0 rgba(0,0,0,0.12); font-weight:700;}

  .paper{
    background:var(--paper);
    background-image:repeating-linear-gradient(to bottom, transparent 0, transparent 38px, rgba(35,50,74,0.05) 38px, rgba(35,50,74,0.05) 39px);
    border-radius:0 6px 6px 6px; box-shadow:var(--shadow);
    padding:40px 46px 34px; min-height:520px; position:relative;
  }
  @media (max-width:720px){.paper{padding:26px 20px 24px;}}
  .paper::before{content:""; position:absolute; left:0; top:0; bottom:0; width:52px; border-right:2px solid rgba(166,61,46,0.18); pointer-events:none;}
  @media (max-width:720px){.paper::before{display:none;}}

  .section-eyebrow{font-family:'IBM Plex Mono'; font-size:11.5px; letter-spacing:0.14em; text-transform:uppercase; color:var(--brass); margin-bottom:6px;}
  .section-title{font-size:28px; margin:0 0 4px; color:var(--chalk-green-dark);}
  .section-sub{color:rgba(35,50,74,0.62); margin:0 0 26px; font-size:14.5px; max-width:640px;}
  .read-cue{
    margin:0 0 24px; padding:14px 16px 14px 15px; max-width:660px;
    border-left:4px solid var(--brass); background:rgba(184,134,59,0.1); border-radius:0 6px 6px 0;
    font-size:16px; font-weight:600; color:var(--chalk-green-dark); line-height:1.45;
  }
  .read-mic{
    display:inline-block; font-family:'IBM Plex Mono'; font-size:10px; font-weight:700;
    text-transform:uppercase; letter-spacing:0.1em; color:var(--paper); background:var(--brass);
    padding:3px 8px; border-radius:3px; margin-right:8px; vertical-align:middle; white-space:nowrap;
  }
  .opt-letter{
    -webkit-box-flex:0; -webkit-flex:0 0 24px; flex:0 0 24px; width:24px; height:24px; display:-webkit-box; display:-webkit-flex; display:flex; -webkit-box-align:center; -webkit-align-items:center; align-items:center; -webkit-box-pack:center; -webkit-justify-content:center; justify-content:center;
    font-family:'IBM Plex Mono'; font-weight:700; font-size:13px; color:var(--chalk-green-dark);
    background:rgba(31,59,44,0.1); border-radius:4px; -webkit-transition:all .12s ease; transition:all .12s ease;
  }
  .opt.checked .opt-letter{background:var(--red-pen); color:var(--paper);}
  .section-points{position:absolute; top:38px; right:44px; font-family:'IBM Plex Mono'; font-size:11px; color:rgba(35,50,74,0.45); text-transform:uppercase; letter-spacing:0.08em;}

  /* mode chooser */
  .chooser{display:-ms-grid; display:grid; -ms-grid-columns:1fr 20px 1fr; grid-template-columns:1fr 1fr; gap:20px; margin:8px 0 4px;}
  @media (max-width:640px){.chooser{-ms-grid-columns:1fr; grid-template-columns:1fr;}}
  .choice-card{
    border:2px solid var(--chalk-green-dark); border-radius:6px; padding:26px 24px; cursor:pointer;
    background:linear-gradient(180deg, rgba(184,134,59,0.05), transparent); -webkit-transition:all .18s ease; transition:all .18s ease;
  }
  .choice-card:hover{background:var(--chalk-green-dark); color:var(--paper);}
  .choice-card:hover .cc-desc,.choice-card:hover .cc-ac{color:rgba(242,236,220,0.8);}
  .cc-ac{font-family:'IBM Plex Mono'; font-size:12px; letter-spacing:0.14em; color:var(--brass); text-transform:uppercase;}
  .cc-name{font-family:'Zilla Slab'; font-size:23px; font-weight:700; margin:8px 0 8px; line-height:1.15;}
  .cc-desc{font-size:14px; line-height:1.55; color:rgba(35,50,74,0.75);}

  .field-row{display:-ms-grid; display:grid; -ms-grid-columns:1fr 28px 1fr; grid-template-columns:repeat(2,1fr); gap:18px 28px; margin-bottom:8px;}
  @media (max-width:640px){.field-row{-ms-grid-columns:1fr; grid-template-columns:1fr;}}
  .field{display:-webkit-box; display:-webkit-flex; display:flex; -webkit-box-orient:vertical; -webkit-box-direction:normal; -webkit-flex-direction:column; flex-direction:column; gap:6px; margin-bottom:6px;}
  .field label{font-size:12.5px; font-weight:600; color:var(--chalk-green-dark); text-transform:uppercase; letter-spacing:0.05em;}
  .field input,.field select{font-family:'Work Sans'; font-size:15px; padding:9px 10px; border:none; border-bottom:1.5px solid rgba(35,50,74,0.3); background:transparent; color:var(--ink); outline:none; -webkit-appearance:none; appearance:none; border-radius:0;}
  .field input:focus,.field select:focus{border-bottom-color:var(--red-pen);}
  .field.wide{grid-column:1/-1;}
  .level-boxes{display:-webkit-box; display:-webkit-flex; display:flex; gap:16px; -webkit-flex-wrap:wrap; flex-wrap:wrap; margin-top:4px;}

  .question{margin-bottom:30px;}
  .question .q-label{font-weight:600; font-size:15.5px; margin-bottom:6px; color:var(--chalk-green-dark);}
  .q-badges{display:-webkit-box; display:-webkit-flex; display:flex; -webkit-flex-wrap:wrap; flex-wrap:wrap; gap:6px; margin-bottom:12px;}
  .q-badge{font-family:'IBM Plex Mono'; font-size:9.5px; text-transform:uppercase; letter-spacing:0.08em; padding:2px 7px; border-radius:2px; background:rgba(184,134,59,0.16); color:var(--brass);}
  .q-badge.pain{background:rgba(166,61,46,0.14); color:var(--red-pen);}
  .q-badge.need{background:rgba(31,59,44,0.12); color:var(--chalk-green-dark);}
  .q-hint{font-size:12.5px; color:rgba(35,50,74,0.5); font-style:italic; margin:-4px 0 12px;}

  .opt-grid{display:-webkit-box; display:-webkit-flex; display:flex; -webkit-box-orient:vertical; -webkit-box-direction:normal; -webkit-flex-direction:column; flex-direction:column; gap:11px;}
  .opt-grid.compact{-webkit-flex-flow:row wrap; flex-flow:row wrap;}
  .opt-grid.compact .opt{-webkit-box-flex:1; -webkit-flex:1 1 calc(50% - 6px); flex:1 1 calc(50% - 6px); min-width:180px;}
  .opt{
    display:-webkit-box; display:-webkit-flex; display:flex;
    -webkit-box-align:center; -webkit-align-items:center; align-items:center; gap:12px; cursor:pointer;
    padding:13px 15px; border:2px solid rgba(31,59,44,0.35); border-radius:6px;
    background:rgba(255,255,255,0.45);
    -webkit-transition:background .15s ease, border-color .15s ease, box-shadow .15s ease; transition:background .15s ease, border-color .15s ease, box-shadow .15s ease;
    -webkit-user-select:none; -moz-user-select:none; -ms-user-select:none; user-select:none;
    -webkit-tap-highlight-color:transparent; touch-action:manipulation;
  }
  .opt:hover{border-color:var(--brass); background:rgba(216,174,104,0.14);}
  .opt.checked{border-color:var(--red-pen); background:rgba(166,61,46,0.1); box-shadow:0 3px 0 rgba(166,61,46,0.22);}
  .opt input{position:absolute; opacity:0; width:1px; height:1px; margin:0; padding:0; border:0;}
  .opt .box{width:22px; height:22px; -webkit-box-flex:0; -webkit-flex:0 0 22px; flex:0 0 22px; border:2px solid var(--chalk-green-dark); border-radius:3px; position:relative; background:var(--paper); -webkit-transition:all .12s ease; transition:all .12s ease;}
  .opt.checked .box,.opt input:checked + .box{border-color:var(--red-pen); background:rgba(166,61,46,0.12);}
  .opt.checked .box::after,.opt input:checked + .box::after{content:""; position:absolute; left:5px; top:0; width:7px; height:13px; border-right:3px solid var(--red-pen); border-bottom:3px solid var(--red-pen); -webkit-transform:rotate(38deg); transform:rotate(38deg);}
  .opt .bubble{width:22px; height:22px; -webkit-box-flex:0; -webkit-flex:0 0 22px; flex:0 0 22px; border-radius:50%; border:2px solid var(--chalk-green-dark); background:var(--paper); position:relative; -webkit-transition:all .12s ease; transition:all .12s ease;}
  .opt.checked .bubble,.opt input:checked + .bubble{background:radial-gradient(circle at 38% 34%, var(--brass-light) 0%, var(--brass) 55%, #8c6528 100%); border-color:var(--brass); box-shadow:0 0 0 3px rgba(184,134,59,0.25);}
  /* fallback dot for WebViews without radial-gradient rendering */
  .opt.checked .bubble::after{content:""; position:absolute; left:5px; top:5px; width:8px; height:8px; border-radius:50%; background:var(--brass);}
  .opt .txt{font-size:15px; font-weight:600; line-height:1.35;}
  .opt.checked .txt{font-weight:700; color:var(--chalk-green-dark);}
  .opt.has-fill{-webkit-flex-wrap:wrap; flex-wrap:wrap;}
  .opt-fill{
    -webkit-box-flex:1; -webkit-flex:1 1 100%; flex:1 1 100%; margin-top:8px; margin-left:34px; font-family:'Work Sans'; font-weight:600;
    font-size:14.5px; padding:9px 11px; border:2px dashed rgba(166,61,46,0.45); border-radius:5px;
    background:rgba(255,255,255,0.7); color:var(--ink); outline:none; -webkit-transition:border-color .15s ease; transition:border-color .15s ease; -webkit-appearance:none; appearance:none;
  }
  .opt-fill:focus{border-color:var(--red-pen); border-style:solid;}
  .opt-fill::-webkit-input-placeholder{color:rgba(35,50,74,0.4); font-style:italic;}
  .opt-fill::placeholder{color:rgba(35,50,74,0.4); font-style:italic;}

  textarea.essay{width:100%; font-family:'Work Sans'; font-size:14.5px; padding:11px 12px; border:1.5px solid rgba(35,50,74,0.25); border-radius:4px; background:rgba(255,255,255,0.4); color:var(--ink); outline:none; resize:vertical; min-height:70px; -webkit-appearance:none; appearance:none;}
  textarea.essay:focus{border-color:var(--red-pen);}

  .nav-row{display:-webkit-box; display:-webkit-flex; display:flex; -webkit-box-pack:justify; -webkit-justify-content:space-between; justify-content:space-between; -webkit-box-align:center; -webkit-align-items:center; align-items:center; margin-top:34px; padding-top:18px; border-top:1px dashed rgba(35,50,74,0.25); -webkit-flex-wrap:wrap; flex-wrap:wrap; gap:10px;}
  .btn{font-family:'IBM Plex Mono'; font-size:12.5px; text-transform:uppercase; letter-spacing:0.08em; padding:11px 22px; border-radius:2px; border:1.5px solid var(--chalk-green-dark); background:transparent; color:var(--chalk-green-dark); cursor:pointer; font-weight:600; -webkit-transition:all .15s ease; transition:all .15s ease; -webkit-appearance:none; appearance:none; -webkit-tap-highlight-color:transparent; touch-action:manipulation;}
  .btn:hover{background:var(--chalk-green-dark); color:var(--paper);}
  .btn.primary{background:var(--chalk-green-dark); color:var(--paper);}
  .btn.primary:hover{background:var(--red-pen); border-color:var(--red-pen); color:var(--paper);}
  .btn:disabled{opacity:0.3; cursor:not-allowed;}
  .btn:disabled:hover{background:transparent; color:var(--chalk-green-dark);}
  .btn.ghost{border-color:rgba(35,50,74,0.3); color:rgba(35,50,74,0.7);}
  .step-count{font-family:'IBM Plex Mono'; font-size:11.5px; color:rgba(35,50,74,0.45);}

  .results-head{text-align:center; padding:6px 0 30px;}
  .stamp-wrap{position:relative; width:230px; height:230px; margin:0 auto 8px; -webkit-transform:rotate(-5deg); transform:rotate(-5deg);}
  .stamp-wrap svg{width:100%; height:100%;}
  .stamp-ring-text{font-family:'IBM Plex Mono'; font-size:10.2px; fill:var(--red-pen); letter-spacing:2px;}
  .stamp-circle{fill:none; stroke:var(--red-pen); stroke-width:2; stroke-dasharray:3 4;}
  .stamp-center{position:absolute; top:0; left:0; right:0; bottom:0; display:-webkit-box; display:-webkit-flex; display:flex; -webkit-box-orient:vertical; -webkit-box-direction:normal; -webkit-flex-direction:column; flex-direction:column; -webkit-box-align:center; -webkit-align-items:center; align-items:center; -webkit-box-pack:center; -webkit-justify-content:center; justify-content:center; color:var(--red-pen);}
  .stamp-score{font-family:'Zilla Slab'; font-weight:700; font-size:52px; line-height:1;}
  .stamp-max{font-family:'IBM Plex Mono'; font-size:12px; opacity:0.75; margin-top:-2px;}
  .stamp-level{font-family:'IBM Plex Mono'; font-size:10.5px; text-transform:uppercase; letter-spacing:0.08em; margin-top:6px; text-align:center; max-width:150px;}

  .results-school{font-family:'Zilla Slab'; font-size:22px; color:var(--chalk-green-dark); margin-top:6px;}
  .results-meta{font-family:'IBM Plex Mono'; font-size:11.5px; color:rgba(35,50,74,0.5); margin-top:2px;}
  .sync-badge{display:-webkit-inline-box; display:-webkit-inline-flex; display:inline-flex; -webkit-box-align:center; -webkit-align-items:center; align-items:center; gap:6px; margin-top:10px; font-family:'IBM Plex Mono'; font-size:10.5px; text-transform:uppercase; letter-spacing:0.08em; padding:5px 11px; border-radius:2px;}
  .sync-badge.saving{background:rgba(35,50,74,0.08); color:rgba(35,50,74,0.6);}
  .sync-badge.saved{background:rgba(31,59,44,0.12); color:var(--chalk-green-dark);}
  .sync-badge.error{background:rgba(166,61,46,0.14); color:var(--red-pen);}
  .sync-dot{width:6px; height:6px; border-radius:50%; background:currentColor;}

  .urgency-band{display:-webkit-box; display:-webkit-flex; display:flex; -webkit-box-align:center; -webkit-align-items:center; align-items:center; -webkit-box-pack:center; -webkit-justify-content:center; justify-content:center; gap:14px; -webkit-flex-wrap:wrap; flex-wrap:wrap; margin:6px 0 4px;}
  .urgency-pill{font-family:'IBM Plex Mono'; font-size:11px; text-transform:uppercase; letter-spacing:0.1em; padding:6px 13px; border-radius:2px; border:1.5px solid;}
  .u-hot{border-color:var(--red-pen); color:var(--red-pen); background:rgba(166,61,46,0.1);}
  .u-warm{border-color:var(--brass); color:var(--brass); background:rgba(184,134,59,0.12);}
  .u-cool{border-color:var(--chalk-green-dark); color:var(--chalk-green-dark); background:rgba(31,59,44,0.1);}

  .breakdown{display:-ms-grid; display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:14px 24px; margin:26px 0 8px;}
  .bd-row .bd-top{display:-webkit-box; display:-webkit-flex; display:flex; -webkit-box-pack:justify; -webkit-justify-content:space-between; justify-content:space-between; font-size:12.5px; margin-bottom:5px;}
  .bd-name{font-weight:600;}
  .bd-score{font-family:'IBM Plex Mono'; color:var(--brass);}
  .bd-bar{height:8px; background:rgba(35,50,74,0.1); border-radius:4px; overflow:hidden;}
  .bd-fill{height:100%; background:linear-gradient(90deg, var(--brass), var(--red-pen)); border-radius:4px;}

  .divider{border:none; border-top:1px dashed rgba(35,50,74,0.25); margin:32px 0;}

  .growth-grid{display:-ms-grid; display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:16px;}
  .growth-card{border:1px solid rgba(35,50,74,0.15); border-radius:4px; padding:16px 18px; background:rgba(255,255,255,0.35);}
  .growth-card .gc-icon{font-family:'IBM Plex Mono'; font-size:10.5px; color:var(--brass); text-transform:uppercase; letter-spacing:0.1em;}
  .growth-card h4{margin:6px 0 8px; font-family:'Zilla Slab'; font-size:17px; color:var(--chalk-green-dark);}
  .growth-card p{margin:0; font-size:13.5px; line-height:1.5; color:rgba(35,50,74,0.8);}
  .growth-card .tier{display:inline-block; margin-top:10px; font-family:'IBM Plex Mono'; font-size:10px; text-transform:uppercase; letter-spacing:0.08em; padding:3px 8px; border-radius:2px;}
  .tier.significant{background:rgba(166,61,46,0.14); color:var(--red-pen);}
  .tier.moderate{background:rgba(184,134,59,0.16); color:var(--brass);}
  .tier.incremental{background:rgba(31,59,44,0.12); color:var(--chalk-green-dark);}

   (the first question whose goal includes "urgency"). Each segment is either
   { kind:"q", qIdx:n } or { kind:"essay" }. */
function flowSegments(){
  var cfg = A();
  var segs = [];
  if(!cfg){ return segs; }
  var essayInserted = false;
  for(var i=0;i<cfg.questions.length;i++){

    segs.push({ kind:"q", qIdx:i });

  if(!essayInserted){ segs.push({ kind:"essay" }); } /* safety fallback */
  return segs;
}

/* ===================== SCORING ===================== */
function matchOption(q, val){
  if(val == null) return null;
  var opt = findItem(q.options, function(o){ return o[0] === val; });
  if(opt) return opt;
  opt = findItem(q.options, function(o){ return (o[2] && o[2].fillIn) && typeof val === "string" && val.indexOf(o[0]) === 0; });
  return opt || null;
}
function scoreQuestion(q){
  var val = state.answers[q.id];
  if(q.type === "radio"){
    if(!val) return 0;
    var opt = matchOption(q, val);
    return opt ? Math.min(opt[1], q.max) : 0;
  }
  var selected = val || [];
  if(q.custom){
    var t = 0;
    each(selected, function(label){
      var o = findItem(q.options, function(o){ return o[0] === label; });
      if(o) t += o[1];
    });
    return Math.min(t, q.max);
  }
  if(q.invert){
    var frac = selected.length / q.options.length;
    return Math.round((1 - frac) * q.max * 10) / 10;
  }
  return Math.min(Math.round((selected.length / q.options.length) * q.max * 10) / 10, q.max);
}
function computeScores(){
  var byQ = {}; var total = 0;
  each(A().questions, function(q){ var s = scoreQuestion(q); byQ[q.id] = s; total += s; });
  return { byQ:byQ, total: Math.round(total * 10) / 10 };
}
function maturityFor(score){
  var M = A().maturity;
  return findItem(M, function(l){ return score >= l.min && score <= l.max; }) || M[M.length - 1];
}

function urgencyProfile(){
  var q8 = state.answers.q8, q9 = state.answers.q9, q10 = state.answers.q10;
  var u = findItem(URGENCY_OPTS, function(o){ return o[0] === q8; });
  var tm = findItem(TIMELINE_OPTS, function(o){ return typeof q9 === "string" && q9.indexOf(o[0]) === 0; });
  var b = findItem(BUDGET_OPTS, function(o){ return o[0] === q10; });
  var uPts = u ? u[1] : 0;
  var tPts = tm ? tm[1] : 0;
  var bPts = b ? b[1] : 0;
  var combined = uPts + tPts + bPts;
  var tier, cls, note;
  if(combined >= 22){ tier = "HOT LEAD — act now"; cls = "u-hot"; note = "High desperation, near-term timeline and budget readiness. Prioritise this proposal."; }
  else if(combined >= 12){ tier = "WARM — follow up soon"; cls = "u-warm"; note = "Real interest with some flexibility on timing or budget. Worth a prompt call."; }
  else { tier = "COOL — nurture"; cls = "u-cool"; note = "Early-stage curiosity. Keep in the pipeline and educate."; }
  return { uPts:uPts, tPts:tPts, bPts:bPts, combined:combined, tier:tier, cls:cls, note:note,
    timelineText: q9 || "Not stated", budgetText: q10 || "Not stated", urgencyText: q8 || "Not stated" };
}

function buildTargets(){
  var cfg = A(); var targets = [];
  function add(x){ if(!contains(targets, x)) targets.push(x); }
  each(cfg.questions, function(q){
    if(q.type === "checkbox" && contains(q.goal || [], "build")){
      var v = state.answers[q.id];
      if(isArr(v)) each(v, function(x){ add(x); });
    }
  });
  var gapQ = findItem(cfg.questions, function(q){ return q.invert; });
  if(gapQ){
    var gv = state.answers[gapQ.id];
    if(isArr(gv)) each(gv, function(x){ add("Digitise: " + x); });
  }
  return targets;
}

function recommendPackage(total){
  var cfg = A(); var names = objKeys(cfg.packages);
  var chosen = names[0];
  for(var i=0;i<names.length;i++){
    var def = cfg.packages[names[i]];
    if(total <= def.cut){ chosen = names[i]; break; }
    chosen = names[i];
  }
  var size = parseInt(state.info.students, 10) || 0;
  if(size >= 1500) chosen = names[names.length - 1];
  return chosen;
}

function buildGrowth(byQ){
  var cfg = A();
  var ranked = map(filter(cfg.questions, function(q){
    return !(contains(q.goal || [], "urgency") || contains(q.goal || [], "timeline"));
  }), function(q){
    return { q:q, frac: byQ[q.id] / q.max };
  });
  ranked.sort(function(a, b){ return a.frac - b.frac; });
  return map(ranked.slice(0, 4), function(r, i){
    var tier = r.frac < 0.4 ? "significant" : (r.frac < 0.7 ? "moderate" : "incremental");
    var label = tier === "significant" ? "High opportunity" : (tier === "moderate" ? "Moderate opportunity" : "Incremental gain");
    var text = tier === "significant"
      ? "A weak spot today — the fastest, most visible win from this engagement."
      : (tier === "moderate"
        ? "Partly in place; tightening this would give a clear, near-term lift."
        : "Already fairly strong — remaining gains are polish and automation.");
    return { icon: pad2(i+1) + " · " + r.q.title, title:r.q.title, tier:tier, label:label, text:text };
  });
}

/* ===================== SUBMIT TO SUPABASE ===================== */
var LEAD_QUEUE_KEY = "ve_pending_leads";
function getQueue(){ try{ return JSON.parse(localStorage.getItem(LEAD_QUEUE_KEY) || "[]"); }catch(e){ return []; } }
function setQueue(q){ try{ localStorage.setItem(LEAD_QUEUE_KEY, JSON.stringify(q)); }catch(e){} }
function queueLead(mode, payload){
  var q = getQueue();
  q.push({ mode:mode, payload:payload, queuedAt: new Date().toISOString() });
  setQueue(q);
}

/* network write; returns a Promise<boolean> when Supabase + Promise exist,
   otherwise returns false synchronously so old WebViews just queue locally. */
function pushLead(mode, payload){
  if(!sb || typeof Promise === "undefined"){ return false; }
  var generic = {
    assessment_type: mode,
    acronym: (ASSESSMENTS[mode] || {}).acronym,
    org_name: payload.orgName || null,
    proprietor: payload.proprietor || null,
    contact_person: payload.contact || null,
    phone: payload.phone || null,
    email: payload.email || null,
    address: payload.address || null,
    size_metric: numOrNull(payload.students),
    secondary_metric: numOrNull(payload.teachers),
    total_score: payload.total,
    maturity_level: payload.maturity,
    section_scores: payload.sectionScores,
    build_targets: payload.buildTargets,
    urgency: payload.urgency,
    recommended_package: payload.package,
    pain_note: payload.essay || null,
    raw_answers: payload.answers,
    notify_email: LEAD_EMAIL
  };
  function genericInsert(){
    return sb.from("assessment_leads").insert(generic).then(function(res){
      if(res && res.error){ if(window.console) console.warn("generic insert:", res.error); return false; }
      return true;
    });
  }
  try{
    if(mode === "school"){
      return sb.schema("schools").rpc("submit_assessment_lead", {
        p_school_name: payload.orgName || "Unnamed School",
        p_proprietor: payload.proprietor || null,
        p_contact_person: payload.contact || null,
        p_phone: payload.phone || null,
        p_email: payload.email || null,
        p_address: payload.address || null,
        p_students: numOrNull(payload.students),
        p_teachers: numOrNull(payload.teachers),
        p_levels: [],
        p_total_score: payload.total,
        p_maturity_level: payload.maturity,
        p_section_scores: payload.sectionScores,
        p_focus_areas: { build: payload.buildTargets, urgency: payload.urgency },
        p_raw_answers: payload.answers,
        p_package_recommended: payload.package
      }).then(function(res){
        if(res && !res.error){ return true; }
        if(res && res.error && window.console) console.warn("school rpc:", res.error);
        return genericInsert();
      })["catch"](function(e){ if(window.console) console.error("school rpc failed:", e); return genericInsert(); });
    }
    return genericInsert()["catch"](function(e){ if(window.console) console.error("insert failed:", e); return false; });
  }catch(e){
    if(window.console) console.error("pushLead failed:", e);
    return false;
  }
}

function flushQueue(){
  if(!sb || typeof Promise === "undefined") return;
  var q = getQueue();
  if(!q.length) return;
  var remaining = [];
  var pending = 0; var done = false;
  function finish(){
    if(done) return; done = true;
    setQueue(remaining);
    if(remaining.length === 0 && state.leadStatus === "queued"){ state.leadStatus = "saved"; updateSyncBadge(); }
  }
  each(q, function(item){
    if(navigator.onLine === false){ remaining.push(item); return; }
    var res = pushLead(item.mode, item.payload);
    if(res && typeof res.then === "function"){
      pending++;
      res.then(function(ok){ if(!ok) remaining.push(item); pending--; if(pending === 0) finish(); },
               function(){ remaining.push(item); pending--; if(pending === 0) finish(); });
    } else if(!res){ remaining.push(item); }
  });
  if(pending === 0) finish();
}

function submitLead(payload){
  if(state.leadStatus === "saving" || state.leadStatus === "saved") return;
  var mode = state.mode;

  if(!sb || typeof Promise === "undefined" || navigator.onLine === false){
    queueLead(mode, payload);
    state.leadStatus = "queued"; updateSyncBadge();
    return;
  }

  state.leadStatus = "saving"; updateSyncBadge();
  var res = pushLead(mode, payload);
  if(res && typeof res.then === "function"){
    res.then(function(ok){
      if(ok){ state.leadStatus = "saved"; }
      else { queueLead(mode, payload); state.leadStatus = "queued"; }
      updateSyncBadge();
    }, function(){
      queueLead(mode, payload); state.leadStatus = "queued"; updateSyncBadge();
    });
  } else {
    queueLead(mode, payload); state.leadStatus = "queued"; updateSyncBadge();
  }
}

function updateSyncBadge(){
  var el = document.getElementById("syncBadge"); if(!el) return;
  var map2 = {
    saving:["saving","Saving to pipeline…"],
    saved:["saved","Saved to Vortexedge pipeline"],
    queued:["saving","Saved on device — will sync when online"],
    error:["error","Couldn't save — use Email button below"]
  };
  var cfg = map2[state.leadStatus];
  if(!cfg){ el.style.display = "none"; return; }
  el.style.display = "inline-flex";
  el.className = "sync-badge " + cfg[0];
  el.innerHTML = '<span class="sync-dot"></span>' + esc(cfg[1]);
}

    (state.essay ? ('<hr class="divider"><h2 class="section-title" style="font-size:20px;">In Their Words</h2><p class="section-sub">&ldquo;' + esc(state.essay) + '&rdquo;</p>') : "") +

    '<div class="results-actions">' +
      '<button class="btn ghost" id="btnBack">&larr; Back</button>' +
      '<button class="btn primary" id="btnEmail">Email results to Vortexedge</button>' +
      '<button class="btn ghost" id="btnPrint">Print / Save PDF</button>' +
      '<button class="btn ghost" id="btnRestart">New assessment</button>' +
    "</div>";

  updateSyncBadge();
  submitLead(payload);

  bindTap(document.getElementById("btnBack"), function(){ state.step--; renderAll(); });
  bindTap(document.getElementById("btnPrint"), function(){ try{ window.print(); }catch(e){} });
  bindTap(document.getElementById("btnEmail"), function(){
    var m = buildEmail(payload, urgency, growth);
    window.location.href = "mailto:" + LEAD_EMAIL + "?subject=" + encodeURIComponent(m.subject) + "&body=" + encodeURIComponent(m.body);
  });
  bindTap(document.getElementById("btnRestart"), function(){
    if(window.confirm("Start a new assessment? Current answers will be cleared.")){
      state.mode = null; state.step = 0; state.info = {}; state.answers = {}; state.essay = ""; state.leadStatus = "idle";
      setBrand(); renderAll();
    }
  });
}

/* ===================== UTIL ===================== */
function numOrNull(v){
  if(v == null) return null;
  var n = parseInt(String(v).replace(/[^0-9]/g, ""), 10);
  return isFinite(n) ? n : null;
}
function esc(str){
  var s = (str == null) ? "" : String(str);
  return s.replace(/[&<>"']/g, function(c){
    if(c === "&") return "&amp;";
    if(c === "<") return "&lt;";
    if(c === ">") return "&gt;";
    if(c === '"') return "&quot;";
    return "&#39;";
  });
}
function hasClass(el, cls){ return (" " + el.className + " ").indexOf(" " + cls + " ") > -1; }
function addClass(el, cls){ if(!hasClass(el, cls)) el.className = (el.className ? el.className + " " : "") + cls; }
function removeClass(el, cls){ el.className = (" " + el.className + " ").replace(" " + cls + " ", " ").replace(/^\s+|\s+$/g, ""); }

/* Tap binding that works on old WebView + modern browsers without double-firing.
   Uses click; guards against a lingering ghost by ignoring rapid repeats. */
function bindTap(el, fn){
  if(!el) return;
  var lock = false;
  el.onclick = function(ev){
    if(ev && ev.preventDefault) ev.preventDefault();
    if(lock) return;
    lock = true;
    setTimeout(function(){ lock = false; }, 350);
    fn.call(el, ev);
  };
}
/* choice-card activation passes the element to the handler */
function bindActivate(el, fn){
  if(!el) return;
  el.onclick = function(ev){
    if(ev && ev.preventDefault) ev.preventDefault();
    fn(el, ev);
  };
}

/* ===================== ROUTER ===================== */
function renderAll(){
  renderTabRail(); setBrand();
  try{ window.scrollTo(0, 0); }catch(e){}
  if(!state.mode){ renderChooser(); return; }
  var segs = flowSegments();
  if(state.step < segs.length){
    var seg = segs[state.step];
    if(seg.kind === "essay"){ renderEssayStep(); }
    else { renderQuestion(seg.qIdx); }
    return;
  }
  if(state.step === BIO_STEP()){ renderCover(); return; }
  renderResults();
}

/* ===================== BOOT ===================== */
function boot(){
  renderAll();
  if(window.addEventListener){ window.addEventListener("online", flushQueue, false); }
  else if(window.attachEvent){ window.attachEvent("ononline", flushQueue); }
  try{ flushQueue(); }catch(e){}
}
if(document.readyState === "complete" || document.readyState === "interactive"){
  boot();
} else if(document.addEventListener){
  document.addEventListener("DOMContentLoaded", boot, false);
} else {
  window.onload = boot;
}

})();
</script>
